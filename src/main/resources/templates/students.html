<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management - Ikonex Academy</title>
        <div class="nav-links">
        <a href="/">&larr; Main Dashboard</a> | 
        <a href="/streams">Streams</a> | 
        <a href="/students">Students</a> | 
        <a href="/subjects">Subjects</a>
    </div>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; color: #333; }
        h1, h2 { color: #2c3e50; }
        .container { max-width: 900px; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-inline { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1; min-width: 150px; }
        button { background-color: #2ecc71; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f2f2f2; }
        .actions a { text-decoration: none; margin-right: 10px; font-weight: bold; }
        .btn-edit { color: #f39c12; }
        .btn-delete { color: #e74c3c; }
        .btn-view { color: #3498db; }
        .error { color: #e74c3c; font-weight: bold; margin-bottom: 15px; }
        .nav-links { margin-bottom: 20px; }
        .nav-links a { text-decoration: none; color: #3498db; font-weight: bold; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-links">
        <a href="/streams">&larr; Manage Class Streams</a>
    </div>

    <h1>Ikonex Academy - Student Management</h1>
    
    <div th:if="${errorMessage}" class="error" th:text="${errorMessage}"></div>

    <h2>Register New Student</h2>
    <form th:action="@{/students/add}" th:object="${newStudent}" method="post" class="form-inline">
        <input type="text" th:field="*{admissionNumber}" placeholder="Admission No (e.g. ADM001)" required />
        <input type="text" th:field="*{firstName}" placeholder="First Name" required />
        <input type="text" th:field="*{lastName}" placeholder="Last Name" required />
        
        <select th:field="*{stream}" required>
            <option value="" disabled selected>Select Class Stream</option>
            <option th:each="stream : ${streams}" th:value="${stream.id}" th:text="${stream.name}"></option>
        </select>
        
        <button type="submit">Register Student</button>
    </form>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h2>All Registered Students</h2>
    <table>
        <thead>
            <tr>
                <th>Admission No</th>
                <th>Full Name</th>
                <th>Class Stream</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.admissionNumber}">ADM001</td>
                <td th:text="${student.firstName + ' ' + student.lastName}">John Doe</td>
                <td th:text="${student.stream != null ? student.stream.name : 'Unassigned'}">Form 1A</td>
                <td class="actions">
                    <a th:href="@{/students/{id}(id=${student.id})}" class="btn-view">View</a>
                    <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn-edit">Edit</a>
                    <a th:href="@{/students/delete/{id}(id=${student.id})}" class="btn-delete" onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(students)}">
                <td colspan="4" style="text-align: center; color: #7f8c8d;">No students registered yet.</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
