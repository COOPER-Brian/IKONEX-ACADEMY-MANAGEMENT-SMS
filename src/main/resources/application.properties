# Database Connection (Railway MySQL)
# This tells Spring Boot where your database is located
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}

# Database username (from Railway variables, NOT hardcoded root)
spring.datasource.username=${MYSQLUSER}

# Database password (secure value from Railway)
spring.datasource.password=${MYSQLPASSWORD}

# MySQL driver (needed for JDBC connection)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA Settings (Hibernate configuration)

# Automatically updates tables based on your Java entities
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in terminal (useful for debugging)
spring.jpa.show-sql=true

# MySQL dialect (helps Hibernate generate correct SQL for MySQL)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect