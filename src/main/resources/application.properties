# Server Configuration
server.port=8080

# Spring Boot App Name
spring.application.name=sms

# Database Connection Config (Auto-detects Local vs Railway)
spring.datasource.url=jdbc:mysql://${MYSQL_PRIVATE_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ikonex_sms}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQL_ROOT_PASSWORD:Zxcvbnm@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Database Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect