# Server Configuration
server.port=8080
spring.application.name=sms

# Consolidated Database Configuration (Reads base URL and applies secure parameters)
spring.datasource.url=${SPRING_DATASOURCE_URL}?useSSL=true&trustServerCertificate=true&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool Optimizations
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=10000

# Hibernate / JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true